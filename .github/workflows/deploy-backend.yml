name: Deploy backend to Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'infra/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/backend
  RESOURCE_GROUP: lightrag-demo-rg
  LOCATION: eastus2
  APP_NAME: lightrag-demo-backend
  ENV_NAME: lightrag-demo-env

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=$(echo ${IMAGE_NAME} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure resource group
        run: az group create -n $RESOURCE_GROUP -l $LOCATION -o none

      - name: Generate registry PAT for ACA pull
        id: ghcr_pat
        run: |
          echo "::add-mask::${{ secrets.GHCR_PULL_PAT }}"
          if [ -n "${{ secrets.GHCR_PULL_PAT }}" ]; then
            echo "user=${{ github.actor }}" >> $GITHUB_OUTPUT
            echo "pat_present=true" >> $GITHUB_OUTPUT
          else
            echo "pat_present=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Bicep
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: ./infra/containerapp.bicep
          parameters: >-
            environmentName=${{ env.ENV_NAME }}
            appName=${{ env.APP_NAME }}
            image=${{ env.IMAGE_NAME }}:${{ github.sha }}
            openaiApiKey=${{ secrets.OPENAI_API_KEY }}
            documentdbUri=${{ secrets.DOCUMENTDB_URI }}
            registryUsername=${{ steps.ghcr_pat.outputs.user }}
            registryPassword=${{ secrets.GHCR_PULL_PAT }}
          failOnStdErr: false

      - name: Show backend URL
        run: |
          FQDN=$(az containerapp show -g $RESOURCE_GROUP -n $APP_NAME --query properties.configuration.ingress.fqdn -o tsv)
          echo "Backend deployed at: https://$FQDN"
          echo "BACKEND_URL=https://$FQDN" >> $GITHUB_ENV
